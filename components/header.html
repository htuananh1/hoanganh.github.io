<header class="bg-white shadow-sm sticky top-0 z-50">

            <!-- Logo -->
            <div class="flex-shrink-0 flex items-center">
                <a href="index.html" class="text-2xl font-bold text-indigo-600 tracking-tight">ShopNow<span class="text-gray-900">.</span></a>
            </div>

            <!-- Navbar Links (Added for Navigation) -->
            <nav class="hidden md:flex space-x-8 ml-8">
                <a href="index.html" class="text-gray-700 hover:text-indigo-600 font-medium">Trang chủ</a>
                <a href="products.html" class="text-gray-700 hover:text-indigo-600 font-medium">Sản phẩm</a>
                <div class="relative group">
                    <button class="text-gray-700 hover:text-indigo-600 font-medium flex items-center focus:outline-none">

                    </button>

                    <div class="absolute left-0 mt-2 w-48 bg-white border border-gray-100 rounded-md shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">

            <!-- Search Bar -->

            <!-- Icons (Cart, User) -->
            <div class="flex items-center space-x-6">

                </a>
                <a href="cart.html" class="text-gray-600 hover:text-indigo-600 transition-colors relative">
                    <i class="fas fa-shopping-cart text-xl"></i>
